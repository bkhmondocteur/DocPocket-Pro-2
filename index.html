<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPocket Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="rgb(0, 51, 153)">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: rgb(0, 51, 153); --primary-hover: rgb(0, 35, 110);
            --secondary-color: #001133; --bg-color: #F4F7F6;
            --card-bg: #FFFFFF; --text-main: #333333;
            --border-color: #E0E0E0; --danger-color: #D32F2F;
            --radius: 8px; --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Styles épurés pour le PDF */
        .pdf-container { display: none; width: 100%; padding: 20px; background: white; color: black; }
        
        /* ... (Gardez ici tous vos styles CSS précédents pour l'interface app-ui) ... */
        /* Note : Pour gagner en lisibilité, le bloc CSS ci-dessous contient les essentiels. 
           Copiez l'intégralité du style de la version précédente pour garantir le design. */
        .app-header { background-color: var(--primary-color); color: white; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 0.6rem 1rem; border-radius: var(--radius); cursor: pointer; }
        .form-section { background: white; padding: 1rem; margin-bottom: 1rem; border-radius: var(--radius); }
        .form-control { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="print-view" class="pdf-container">
        </div>

    <div id="print-report-view" class="pdf-container">
        </div>

    <script>
        // --- UTILITAIRE DE DATE POUR FICHIERS ---
        function getFileTimestamp() {
            return new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
        }

        // --- GÉNÉRATEUR DE PDF UNIFIÉ ---
        async function exportToPDF(elementId, baseName) {
            const element = document.getElementById(elementId);
            const filename = `${baseName}_${getFileTimestamp()}.pdf`;
            
            const opt = {
                margin:       10,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            element.style.display = 'block'; // Rendre visible pour capture
            await html2pdf().set(opt).from(element).save();
            element.style.display = 'none'; // Recacher après
        }

        // --- LOGIQUE APP (MODIFIÉE) ---
        const app = {
            // ... (Gardez tout votre code précédent, remplacez juste ces 3 fonctions) ...

            async exportBackup() {
                const data = localStorage.getItem(this.STORAGE_KEY); if(!data) return alert("Base vide.");
                const blob = new Blob([data], { type: "application/json" });
                const a = document.createElement('a'); 
                // NOUVEAU NOM AUTO
                a.download = `DocPocket_Sauvegarde_${getFileTimestamp()}.json`;
                a.href = URL.createObjectURL(blob);
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            },

            generatePDF(id) {
                const v = this.visits.find(x => x.id === id); if (!v) return;
                // (Remplissage de votre div print-view ici...)
                exportToPDF('print-view', `Consultation_${v.name.replace(/\s+/g, '_')}`);
            },

            generateMonthlyReport() {
                // (Remplissage de votre div print-report-view ici...)
                exportToPDF('print-report-view', 'Rapport_Mensuel');
            },

            // ... (Le reste du code identique) ...
        };
    </script>
</body>
</html>
